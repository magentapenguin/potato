name: Build Files for Distribution
on: 
    push:
        branches: ["main"]
    release:
       types: [published]
    workflow_dispatch:
permissions:
  contents: write
jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v6
            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: '3.x'
            - name: Install dependencies
              run: |
                  pip install bs4
            - name: Run build script
              run: |
                  python build.py
            - name: Upload built files to latest release
              run: |
                LATEST_TAG=$(gh release list --limit 1 --json tagName -q '.[0].tagName')
                gh release upload "$LATEST_TAG" dist/index.html --clobber
              env:
                GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            - name: Save built file
              run: |
                  cp dist/index.html /tmp/index.html
            - name: Push to dist branch
              run: |
                  git fetch origin dist || true
                  git checkout dist || git checkout --orphan dist
                  # Clean the working tree
                  git rm -rf . || true
                  # Copy the built file back
                  mkdir -p dist
                  cp /tmp/index.html dist/index.html
                  git add dist/index.html
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git commit -m "Add built files for ${{ github.event.release.tag_name || github.sha }}" || echo "No changes to commit"
                  git push origin dist

            
              