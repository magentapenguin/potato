<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8'>
    <title>Potato Main Menu</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' href='style.css'> <!-- inline-content 'style.css' file: style.css -->
    <script src="update.js" type="module"></script> <!-- i have no idea why this is removed in build but when i add remove-in-build to it, it removes the styles?? -->
    <link rel="manifest" href="manifest.webmanifest"> <!-- remove-in-build -->
    <style>
        #save-list-empty {
            display: none;
        }

        #main-menu:not(:has(#save-list div)) #save-list-empty {
            display: block;
        }

        #save-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .save-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border: 1px solid #333;
            border-radius: 5px;
        }

        .save-name {
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .save-item.current-save {
            background-color: #111;
            border-color: #354;
        }

        .save-buttons {
            display: flex;
            gap: 5px;
        }

        .save-info {
            color: #888;
            font-weight: 400;
        }

        #create-save,
        #import-save {
            width: 100%;
        }
    </style>
</head>

<body>
    <noscript>
        <p
            style="color:#e66;background-color:#300;padding:10px;margin-inline:10px;border-radius:10px;border:1px solid #e654;">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor"
                style="width:20px;height:20px;vertical-align:-5px;margin-inline-end:6px;">
                <path fill-rule="evenodd"
                    d="M6.701 2.25c.577-1 2.02-1 2.598 0l5.196 9a1.5 1.5 0 0 1-1.299 2.25H2.804a1.5 1.5 0 0 1-1.3-2.25l5.197-9ZM8 4a.75.75 0 0 1 .75.75v3a.75.75 0 1 1-1.5 0v-3A.75.75 0 0 1 8 4Zm0 8a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z"
                    clip-rule="evenodd" />
            </svg>Please enable JavaScript to view the content.
        </p>
    </noscript>
    <div id='main-menu'
        style='display: flex; flex-direction: column; gap: 20px; padding: 20px; width: clamp(300px, 80%, 800px); margin: auto;'>
        <h1 style="text-align: center;">Potato</h1>
        <div style="display: flex; gap: 10px; justify-content: center; anchor-name: --buttons;">
            <button id='create-save' class="button">Create New Save</button>
            <button id='import-save' class="button">Import Save</button>
        </div>
        <button id='refresh-saves' class="reset-button" title="Refresh Save List"
            style="width: fit-content; align-self: center; position-anchor: --buttons; position: fixed; left: calc(anchor(end) + 5px); top: anchor(center); transform: translateY(-50%);"><svg
                xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" class="icon"
                style="font-size: 18px; transform: rotate(var(--spin, 0deg)); transition: transform linear 1s;"><!--!Font Awesome Free v7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.-->
                <path
                    d="M500.7 138.7L512 149.4L512 96C512 78.3 526.3 64 544 64C561.7 64 576 78.3 576 96L576 224C576 241.7 561.7 256 544 256L416 256C398.3 256 384 241.7 384 224C384 206.3 398.3 192 416 192L463.9 192L456.3 184.8C456.1 184.6 455.9 184.4 455.7 184.2C380.7 109.2 259.2 109.2 184.2 184.2C109.2 259.2 109.2 380.7 184.2 455.7C259.2 530.7 380.7 530.7 455.7 455.7C463.9 447.5 471.2 438.8 477.6 429.6C487.7 415.1 507.7 411.6 522.2 421.7C536.7 431.8 540.2 451.8 530.1 466.3C521.6 478.5 511.9 490.1 501 501C401 601 238.9 601 139 501C39.1 401 39 239 139 139C238.9 39.1 400.7 39 500.7 138.7z" />
            </svg></button>
        <div id="save-list-empty" style="text-align: center; color: #888;">No saves found. Create a new save to get
            started!</div>
        <div id='save-list'></div>
    </div>
    <tauri-update-notification></tauri-update-notification> <!-- remove-in-build -->
    <script src='menu.js' type="module"></script> <!-- inline-content 'menu.js' file: menu.js -->
</body>

</html>
