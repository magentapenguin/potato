<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <title>Potato Main Menu</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' href='style.css'>
    <link rel="manifest" href="manifest.webmanifest">
    <style> 
        #save-list-empty {
            display: none;
        }
        #main-menu:not(:has(#save-list div)) #save-list-empty {
            display: block;
        }
        #save-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .save-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border: 1px solid #333;
            border-radius: 5px;
        }
        .save-name {
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .save-item.current-save {
            background-color: #111;
            border-color: #354;
        }
        .save-buttons {
            display: flex;
            gap: 5px;
        }
        .save-info {
            color: #888;
            font-weight: 400;
        }
        #create-save, #import-save {
            width: 100%;
        }
    </style>
</head>
<body>
    <div id='main-menu' style='display: flex; flex-direction: column; gap: 20px; padding: 20px; width: clamp(300px, 80%, 800px); margin: auto;'>
        <h1 style="text-align: center;">Potato</h1>
        <div style="display: flex; gap: 10px; justify-content: center;">
            <button id='create-save' class="button">Create New Save</button>
            <button id='import-save' class="button">Import Save</button>
        </div>
        <div id="save-list-empty" style="text-align: center; color: #888;">No saves found. Create a new save to get started!</div>
        <div id='save-list'></div>
    </div>
    <script src='menu.js' type="module"></script>
</body>
</html>
