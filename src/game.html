<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2.5d Maze Runner</title>
    <link rel="icon" type="image/png" href="favicon.png"> <!-- inline-content 'favicon.png' file: src/favicon.png -->
    <link rel="stylesheet" href="style.css"> <!-- inline-content 'style.css' file: src/style.css -->
    <style>
        #shop {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        #shop>* {
            margin: 0;
        }

        div:has(> #leave-shop) {
            position: sticky;
            bottom: 0;
            width: 100%;
            background-color: #1a1b22;
        }

        #leave-shop {
            width: 100%;
        }

        #shop-items {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 0 1 auto; /* Allow to shrink but not grow, so it doesn't take up all space and push the leave button down */
            width: 100%;
        }

        .shop-item {
            display: flex;
            flex-direction: row;
            padding: 10px;

            background-color: #2c2d35;
            border-radius: 5px;
        }

        .shop-item strong {
            font-size: 18px;
        }

        .shop-item button {
            margin-left: auto;
            padding: 5px 10px;
            cursor: pointer;
            font: inherit;
            background-color: #0a6354;
            border: none;
            color: white;
            border-radius: 5px;
        }

        .shop-item button:hover:not(:disabled) {
            background-color: #0b7e70;
        }

        .shop-item div {
            display: flex;
            flex-direction: column;
            gap: 1px;
            flex: 1;
        }

        .shop-item.disabled {
            background-color: #1a1b22;
            opacity: 0.5;
            cursor: not-allowed;
        }

        #settings-menu label {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #settings-menu label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
    </style>
    <link rel="manifest" href="manifest.webmanifest"> <!-- remove-in-build -->
</head>

<body>
    <div id="loading"
        style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 24px; color: white;">
        Loading...
    </div>
    <button
        id="settings"
        onclick="document.getElementById('settings-menu').showModal()"
        style="position: absolute; top: 10px; right: 10px; background: none; border: none; color: white; cursor: pointer;"
        >
        <span class="sr-only">Settings</span>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
            <path d="M18.75 12.75h1.5a.75.75 0 0 0 0-1.5h-1.5a.75.75 0 0 0 0 1.5ZM12 6a.75.75 0 0 1 .75-.75h7.5a.75.75 0 0 1 0 1.5h-7.5A.75.75 0 0 1 12 6ZM12 18a.75.75 0 0 1 .75-.75h7.5a.75.75 0 0 1 0 1.5h-7.5A.75.75 0 0 1 12 18ZM3.75 6.75h1.5a.75.75 0 1 0 0-1.5h-1.5a.75.75 0 0 0 0 1.5ZM5.25 18.75h-1.5a.75.75 0 0 1 0-1.5h1.5a.75.75 0 0 1 0 1.5ZM3 12a.75.75 0 0 1 .75-.75h7.5a.75.75 0 0 1 0 1.5h-7.5A.75.75 0 0 1 3 12ZM9 3.75a2.25 2.25 0 1 0 0 4.5 2.25 2.25 0 0 0 0-4.5ZM12.75 12a2.25 2.25 0 1 1 4.5 0 2.25 2.25 0 0 1-4.5 0ZM9 15.75a2.25 2.25 0 1 0 0 4.5 2.25 2.25 0 0 0 0-4.5Z" />
        </svg>          
    </button>
    <dialog
        id="settings-menu"
        style="background-color: #1a1b22; border: 1px #2c2d35 solid; color: white; padding: 20px; border-radius: 5px; display: flex; flex-direction: column; gap: 10px;"
        >
        <label>
            <span>Music</span>
            <select id="music-type">
                <option value="off" selected>Off</option>
                <option value="spooky">Spooky</option>
                <!-- More later -->
            </select>
        </label>
        <label>
            <span>Mouse Sensitivity</span>
            <input type="range" id="mouse-sensitivity" min="0.1" max="5" value="1" step="0.1">
        </label>
        <label>
            <span>Music Volume</span>
            <input type="range" id="music-volume" min="0" max="1" value="1" step="0.01">
        </label>
        <label>
            <span>Sound Effects Volume</span>
            <input type="range" id="sfx-volume" min="0" max="1" value="1" step="0.01">
        </label>
        <label>
            <span>Footstep Volume</span>
            <input type="range" id="footstep-volume" min="0" max="1" value="1" step="0.01">
        </label>
        <label>
            <span>Invert Y-Axis</span> <!-- Pointless (maybe a future update?) -->
            <input type="checkbox" id="invert-y">
        </label>
        <button class="button" id="export-settings">
            Export Settings
        </button>
        <button class="button" id="import-settings">
            Import Settings
        </button>
        <button id="close-settings" class="button"
        onclick="document.getElementById('settings-menu').close()">
            Close
        </button>
    </dialog>
    <dialog id="shop"
        style="position: absolute; inset: 0; width: 100%; overflow-y: auto; border-radius: 5px; background-color: black; border: 1px #2c2d35 solid; padding: 10px; color: white;">
        <h1>Welcome to the shop!</h1>
        <p style="position: sticky; top: 0; z-index: 10;">You have <span id="coin-count"></span> coins.</p>
        <div id="shop-items"></div>
        <div>
            <button class="button" id="leave-shop" style="z-index: 10;">Leave Shop</button>
        </div>
    </dialog>
    <canvas id="canvas" width="720" height="480" style="width: auto;"></canvas>
    <a class="button" href="index.html" style="text-decoration: none;"> <!-- replace-in-build index.html->#/index.html -->
        Menu
    </a>
    <script src="game.js" type="module"></script> <!-- inline-content 'game.js' file: src/game.js -->
</body>

</html>
